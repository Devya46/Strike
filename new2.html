<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover"
    />
    <title>RMI Engine | Live Market Intelligence — Adaptive Dashboard</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family:
          system-ui,
          -apple-system,
          "Segoe UI",
          Roboto,
          "Helvetica Neue",
          sans-serif;
        background: #ffffff;
        width: 100%;
        overflow-x: hidden;
      }

      /* ========== MAIN SECTION ========== */
      .rmi-market-intel {
        background: #ffffff;
        width: 100%;
        padding: clamp(20px, 5vw, 65px) clamp(16px, 4vw, 48px)
          clamp(32px, 6vw, 48px) clamp(16px, 4vw, 48px);
      }

      .rmi-container {
        max-width: 1400px;
        margin: 0 auto;
        width: 100%;
      }

      /* HEADER — fully fluid */
      .rmi-header {
        text-align: center;
        margin-bottom: clamp(24px, 5vw, 40px);
      }

      .rmi-main-title {
        font-size: clamp(28px, 8vw, 56px);
        font-weight: 800;
        letter-spacing: -0.02em;
        background: linear-gradient(
          135deg,
          #0f172a 0%,
          #1e3a8a 55%,
          #0f2b3d 100%
        );
        background-clip: text;
        -webkit-background-clip: text;
        color: transparent;
        margin-bottom: clamp(16px, 3vw, 24px);
        line-height: 1.2;
      }

      /* Tagline — responsive wrap & spacing */
      .rmi-tagline {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: clamp(10px, 3vw, 24px);
        margin-bottom: clamp(20px, 4vw, 32px);
        row-gap: 12px;
      }

      .rmi-tag-item {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        background: #f8fafc;
        padding: 6px 14px;
        border-radius: 60px;
        border: 1px solid #e2e8f0;
        font-weight: 500;
        font-size: clamp(0.75rem, 3vw, 0.9rem);
        color: #1e293b;
        transition: all 0.2s ease;
        backdrop-filter: blur(2px);
        white-space: nowrap;
      }

      /* if screen extremely narrow, allow text to wrap softly */
      @media (max-width: 480px) {
        .rmi-tag-item {
          white-space: normal;
          text-align: center;
          padding: 6px 12px;
          font-size: 0.7rem;
        }
      }

      .rmi-tag-item svg {
        width: 18px;
        height: 18px;
        stroke: #2563eb;
        stroke-width: 1.7;
        flex-shrink: 0;
      }

      /* LIVE RMI Badge — fully responsive */
      .rmi-badge {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        flex-wrap: wrap;
        gap: 12px;
        background: #0f172a;
        padding: 8px 20px;
        border-radius: 60px;
        border: 1px solid rgba(37, 99, 235, 0.5);
        box-shadow: 0 8px 20px -8px rgba(0, 0, 0, 0.2);
        margin-bottom: 8px;
        transition: all 0.2s;
      }

      @media (max-width: 500px) {
        .rmi-badge {
          padding: 6px 16px;
          gap: 8px;
        }
        .badge-text {
          font-size: 0.8rem;
        }
      }

      .live-pulse {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .pulse-dot {
        width: 10px;
        height: 10px;
        background-color: #10b981;
        border-radius: 50%;
        animation: pulse 1.5s infinite;
        flex-shrink: 0;
      }

      @keyframes pulse {
        0% {
          transform: scale(0.95);
          box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7);
        }
        70% {
          transform: scale(1);
          box-shadow: 0 0 0 6px rgba(16, 185, 129, 0);
        }
        100% {
          transform: scale(0.95);
          box-shadow: 0 0 0 0 rgba(16, 185, 129, 0);
        }
      }

      .badge-text {
        font-weight: 700;
        color: white;
        font-size: 0.9rem;
        letter-spacing: 0.2px;
      }

      .engine-highlight {
        background: linear-gradient(120deg, #60a5fa, #c084fc);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        font-weight: 800;
      }

      /* CHART CONTAINER — fully responsive, fluid height, no overflow */
      .rmi-chart-wrapper {
        background: #0b1120;
        border-radius: 28px;
        overflow: hidden;
        border: 1px solid #1e293b;
        margin-top: 20px;
        width: 100%;
        transition: all 0.2s ease;
        box-shadow: 0 12px 30px -12px rgba(0, 0, 0, 0.25);
      }

      /* TradingView iframe & container fluid approach */
      .tradingview-widget-container {
        width: 100%;
        position: relative;
        min-height: clamp(380px, 55vw, 560px);
        background: #0b1120;
      }

      /* ensure iframe resizes perfectly */
      .tradingview-widget-container iframe,
      .tradingview-widget-container object,
      .tradingview-widget-container embed {
        width: 100% !important;
        height: 100% !important;
        min-height: clamp(380px, 55vw, 560px);
        display: block;
        border: none;
      }

      /* fallback / loading indicator — adaptive */
      .chart-fallback {
        background: #0b1120;
        width: 100%;
        min-height: clamp(380px, 55vw, 560px);
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 24px;
        color: #94a3b8;
        font-size: 14px;
        text-align: center;
        flex-direction: column;
        gap: 12px;
      }

      /* footer */
      .rmi-footer-note {
        text-align: center;
        margin-top: clamp(20px, 5vw, 32px);
      }

      .rmi-credit {
        font-size: clamp(10px, 3vw, 13px);
        color: #6b7280;
        background: #f9fafb;
        padding: 6px 18px;
        border-radius: 40px;
        display: inline-block;
        backdrop-filter: blur(2px);
        letter-spacing: 0.2px;
      }

      /* optional hover & interactions */
      .rmi-tag-item:hover {
        border-color: #cbd5e1;
        background: #f1f5f9;
        transform: translateY(-1px);
      }

      /* tablet & small tweaks */
      @media (max-width: 640px) {
        .rmi-chart-wrapper {
          border-radius: 20px;
        }
        .rmi-badge svg {
          width: 16px;
          height: 16px;
        }
        .badge-text {
          font-size: 0.75rem;
        }
      }

      /* landscape orientation fix */
      @media (max-height: 500px) and (orientation: landscape) {
        .rmi-market-intel {
          padding: 16px 20px 24px;
        }
        .tradingview-widget-container {
          min-height: 320px;
        }
        .rmi-main-title {
          margin-bottom: 8px;
        }
        .rmi-tagline {
          margin-bottom: 12px;
        }
      }
    </style>
  </head>
  <body>
    <section class="rmi-market-intel">
      <div class="rmi-container">
        <!-- Header Section — fully fluid typography & spacing -->
        <div class="rmi-header">
          <h1 class="rmi-main-title">Live Market Intelligence</h1>

          <div class="rmi-tagline">
            <div class="rmi-tag-item">
              <svg
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="1.8"
              >
                <path d="M12 2a10 10 0 1 0 9.5 6.5" />
                <path d="M12 8a4 4 0 1 0 3.5 5.5" />
                <circle cx="12" cy="12" r="2" />
                <path d="M21 3v6h-6" />
              </svg>
              <span>RMI Real-Time Clarity</span>
            </div>
            <div class="rmi-tag-item">
              <svg
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="1.8"
              >
                <path d="M2 20L22 20" />
                <path d="M6 16L6 10" />
                <path d="M12 16L12 6" />
                <path d="M18 16L18 12" />
                <circle cx="18" cy="8" r="2" />
              </svg>
              <span>Institutional-Grade Signals</span>
            </div>
            <div class="rmi-tag-item">
              <svg
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="1.8"
              >
                <circle cx="12" cy="12" r="10" />
                <path d="M10 8l6 4-6 4V8z" />
                <path d="M2 12h2M22 12h-2M12 2v2M12 20v2" />
              </svg>
              <span>Live Walkthrough</span>
            </div>
          </div>

          <div class="rmi-badge">
            <div class="live-pulse">
              <span class="pulse-dot"></span>
              <span class="badge-text">LIVE</span>
            </div>
            <svg
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              style="flex-shrink: 0"
            >
              <path
                d="M12 2L2 7L12 12L22 7L12 2Z"
                stroke="#60a5fa"
                stroke-width="1.5"
              />
              <path d="M2 17L12 22L22 17" stroke="#60a5fa" stroke-width="1.5" />
              <path d="M2 12L12 17L22 12" stroke="#c084fc" stroke-width="1.5" />
              <circle cx="12" cy="12" r="1.5" fill="#c084fc" />
            </svg>
            <span class="badge-text"
              ><span class="engine-highlight">RMI ENGINE</span></span
            >
          </div>
        </div>

        <!-- LIVE CHART — fully responsive dynamic widget with resize resilience -->
        <div class="rmi-chart-wrapper">
          <div class="tradingview-widget-container" id="tv-container-main">
            <div id="tradingview-root"></div>
            <!-- TradingView Embed: symbol overview with modern area chart, dark theme, auto-sizing -->
            <script type="text/javascript">
              (function initTradingView() {
                // Avoid double init if script runs again
                if (window.tvWidgetLoaded) return;
                window.tvWidgetLoaded = true;

                // Create container script
                const script = document.createElement("script");
                script.src =
                  "https://s3.tradingview.com/external-embedding/embed-widget-symbol-overview.js";
                script.async = true;
                script.type = "text/javascript";
                script.innerHTML = JSON.stringify({
                  symbols: [
                    ["Gold", "OANDA:XAUUSD|1D"],
                    ["Bitcoin", "BITSTAMP:BTCUSD|1D"],
                    ["Crude Oil", "TVC:USOIL|1D"],
                  ],
                  chartType: "area",
                  lineWidth: 2,
                  colorTheme: "dark",
                  backgroundColor: "#0b1120",
                  widgetFontColor: "#DBDBDB",
                  autosize: true,
                  width: "100%",
                  height: "100%",
                  locale: "en",
                });

                const container =
                  document.getElementById("tradingview-root")?.parentNode ||
                  document.querySelector(".tradingview-widget-container");
                if (container) {
                  // clear any potential fallback before adding
                  const existingFallback =
                    container.querySelector(".chart-fallback");
                  if (existingFallback) existingFallback.remove();
                  container.appendChild(script);
                } else {
                  // fallback if container missing
                  document
                    .querySelector("#tv-container-main")
                    ?.appendChild(script);
                }

                // handle resize propagation: ensures widget iframe adapts to container size changes (orientation, window resize)
                window.addEventListener("resize", function () {
                  const iframes = document.querySelectorAll(
                    ".tradingview-widget-container iframe",
                  );
                  iframes.forEach((iframe) => {
                    try {
                      // trigger reflow by resetting min-height style communication
                      if (iframe.contentWindow && iframe.style) {
                        const currentHeight = iframe.clientHeight;
                        iframe.style.height = currentHeight + "px";
                        setTimeout(() => {
                          iframe.style.height = "100%";
                        }, 50);
                      }
                    } catch (e) {
                      /* cross-origin limitations are fine */
                    }
                  });
                });
              })();
            </script>
          </div>
        </div>

        <!-- Footer with responsive style -->
        <div class="rmi-footer-note">
          <span class="rmi-credit">
            ⚡ Real-time data via TradingView • RMI Engine active • Live
            institutional feeds
          </span>
        </div>
      </div>
    </section>

    <!-- Enhanced robust fallback & responsive check for TradingView widget -->
    <script>
      (function () {
        // Retry mechanism to ensure chart loads and responsive iframe height is enforced
        let retryCount = 0;
        const maxRetries = 12;
        let fallbackAdded = false;

        function enforceResponsiveChart() {
          const widgetFrame = document.querySelector(
            ".tradingview-widget-container iframe",
          );
          const widgetDiv = document.querySelector(
            ".tradingview-widget-container",
          );
          if (widgetFrame && widgetDiv) {
            // make sure iframe dimensions fill the container fluidly
            widgetFrame.style.width = "100%";
            widgetFrame.style.height = "100%";
            widgetFrame.style.minHeight = "clamp(380px, 55vw, 560px)";
            // remove any loading artifacts
            const existingMsg = widgetDiv.querySelector(".chart-fallback");
            if (existingMsg) existingMsg.remove();
            return true;
          }
          return false;
        }

        function addFriendlyFallback() {
          if (fallbackAdded) return;
          const container = document.querySelector(
            ".tradingview-widget-container",
          );
          if (!container) return;
          // avoid double fallback
          if (container.querySelector(".chart-fallback")) return;

          const fallbackDiv = document.createElement("div");
          fallbackDiv.className = "chart-fallback";
          fallbackDiv.setAttribute("aria-label", "Chart loading fallback");
          fallbackDiv.style.cssText =
            "background: #0b1120; width: 100%; min-height: clamp(380px, 55vw, 560px); display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 14px; border-radius: 24px; color: #cbd5e1;";
          fallbackDiv.innerHTML = `
          <svg width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="#60a5fa" stroke-width="1.3">
            <path d="M3 3v18h18" stroke="#60a5fa" stroke-linecap="round"/>
            <path d="M18 17V9" stroke="#a78bfa" stroke-linecap="round"/>
            <path d="M12 17V5" stroke="#60a5fa" stroke-linecap="round"/>
            <path d="M6 17v-3" stroke="#818cf8" stroke-linecap="round"/>
            <circle cx="18" cy="8" r="1.5" fill="#10b981" stroke="none"/>
          </svg>
          <p style="font-size: clamp(13px, 4vw, 15px); margin: 0;">Loading live market charts...</p>
          <button id="retry-chart-btn" style="background: #1e293b; border: none; color: white; padding: 6px 20px; border-radius: 40px; font-size: 13px; margin-top: 6px; cursor: pointer; font-weight: 500;">↻ Refresh Chart</button>
          <small style="font-size: 11px; opacity: 0.7;">RMI Engine • real-time data ready</small>
        `;
          container.appendChild(fallbackDiv);
          fallbackAdded = true;

          const retryBtn = document.getElementById("retry-chart-btn");
          if (retryBtn) {
            retryBtn.addEventListener("click", function (e) {
              e.preventDefault();
              // remove fallback and re-init widget
              const fb = container.querySelector(".chart-fallback");
              if (fb) fb.remove();
              fallbackAdded = false;
              // reinitialize TradingView script
              const existingScripts = container.querySelectorAll(
                'script[src*="embed-widget-symbol-overview"]',
              );
              existingScripts.forEach((script) => script.remove());
              const newScript = document.createElement("script");
              newScript.src =
                "https://s3.tradingview.com/external-embedding/embed-widget-symbol-overview.js";
              newScript.async = true;
              newScript.type = "text/javascript";
              newScript.innerHTML = JSON.stringify({
                symbols: [
                  ["Gold", "OANDA:XAUUSD|1D"],
                  ["Bitcoin", "BITSTAMP:BTCUSD|1D"],
                  ["Crude Oil", "TVC:USOIL|1D"],
                ],
                chartType: "area",
                lineWidth: 2,
                colorTheme: "dark",
                backgroundColor: "#0b1120",
                widgetFontColor: "#DBDBDB",
                autosize: true,
                width: "100%",
                height: "100%",
                locale: "en",
              });
              container.appendChild(newScript);
              setTimeout(() => enforceResponsiveChart(), 400);
            });
          }
        }

        // Monitor chart loading with retries
        const interval = setInterval(() => {
          const iframeExists = document.querySelector(
            ".tradingview-widget-container iframe",
          );
          if (iframeExists) {
            enforceResponsiveChart();
            // also ensure any fallback is removed
            const container = document.querySelector(
              ".tradingview-widget-container",
            );
            if (container && container.querySelector(".chart-fallback")) {
              container.querySelector(".chart-fallback")?.remove();
              fallbackAdded = false;
            }
            clearInterval(interval);
          } else {
            retryCount++;
            if (retryCount >= maxRetries) {
              clearInterval(interval);
              // add interactive fallback if chart never rendered
              if (
                !document.querySelector(".tradingview-widget-container iframe")
              ) {
                addFriendlyFallback();
              }
            }
          }
        }, 700);

        // Extra: Observe container size changes to ensure iframe responsiveness (ResizeObserver)
        if (window.ResizeObserver) {
          const chartWrapper = document.querySelector(".rmi-chart-wrapper");
          if (chartWrapper) {
            const resizeObserver = new ResizeObserver((entries) => {
              const iframe = document.querySelector(
                ".tradingview-widget-container iframe",
              );
              if (iframe && iframe.style) {
                // force fluid height update
                const containerHeight = document.querySelector(
                  ".tradingview-widget-container",
                )?.clientHeight;
                if (
                  containerHeight &&
                  iframe.clientHeight !== containerHeight
                ) {
                  iframe.style.height = containerHeight + "px";
                }
              }
            });
            resizeObserver.observe(chartWrapper);
          }
        }

        // manual orientation / resize event to fix any iframe rigidity
        window.addEventListener("orientationchange", function () {
          setTimeout(() => {
            const iframe = document.querySelector(
              ".tradingview-widget-container iframe",
            );
            if (iframe) {
              iframe.style.height = "100%";
              iframe.style.width = "100%";
            }
          }, 100);
        });

        window.addEventListener("load", function () {
          setTimeout(() => enforceResponsiveChart(), 300);
        });
      })();
    </script>

    <!-- Additional inline style to make sure iframe container uses full width dynamic height -->
    <style>
      /* extra overrides for perfect responsiveness on all devices */
      .tradingview-widget-container {
        display: flex;
        width: 100%;
        height: auto;
        min-height: clamp(380px, 55vw, 560px);
      }
      .tradingview-widget-container iframe {
        border-radius: 20px;
        transition: height 0.1s ease;
      }
      .rmi-chart-wrapper {
        transition: all 0.2s;
      }
      /* ensure no overflow on any mobile */
      body,
      .rmi-market-intel {
        overflow-x: hidden;
      }
      button#retry-chart-btn {
        cursor: pointer;
        transition: 0.2s;
        background: #2563eb;
        border: none;
        color: white;
        font-weight: 500;
      }
      button#retry-chart-btn:hover {
        background: #3b82f6;
        transform: scale(0.98);
      }
      /* fix tiny tap targets on mobile */
      .rmi-badge,
      .rmi-tag-item,
      button {
        cursor: pointer;
      }
      /* better safe margins */
      @media (max-width: 480px) {
        .rmi-tag-item svg {
          width: 14px;
          height: 14px;
        }
        .rmi-badge svg {
          width: 14px;
          height: 14px;
        }
      }
    </style>
  </body>
</html>
