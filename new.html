<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=yes"
    />
    <title>Live Market Intelligence | RMI Engine Charts</title>
    <style>
      /* RESET & BASE */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family:
          system-ui,
          -apple-system,
          "Segoe UI",
          Roboto,
          "Helvetica Neue",
          sans-serif;
        background: #ffffff; /* pure white background for entire page */
        width: 100%;
        overflow-x: hidden;
      }

      /* main section container — white background, clean */
      .market-section {
        background: #ffffff;
        padding: 50px 20px;
        text-align: center;
        color: #111827;
        width: 100%;
      }

      /* heading group: new structure for live market intelligence + RMI row */
      .heading-group {
        max-width: 900px;
        margin: 0 auto 20px;
      }

      .main-headline {
        font-size: 48px;
        font-weight: 800;
        letter-spacing: -0.02em;
        background: linear-gradient(
          135deg,
          #0f172a 0%,
          #1e3a8a 60%,
          #0f2b3d 100%
        );
        background-clip: text;
        -webkit-background-clip: text;
        color: transparent;
        margin-bottom: 16px;
        line-height: 1.4;
      }

      /* tagline with icons (no emojis) */
      .tagline {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 28px;
        row-gap: 12px;
        margin-bottom: 24px;
        font-size: 15px;
        font-weight: 500;
        color: #2d3a5e;
        letter-spacing: -0.2px;
      }

      .tagline-item {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        background: #f8fafc;
        padding: 6px 16px;
        border-radius: 40px;
        backdrop-filter: blur(2px);
        border: 1px solid #e2e8f0;
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.02);
      }

      .tagline-item svg {
        width: 18px;
        height: 18px;
        stroke: #2563eb;
        stroke-width: 1.7;
        fill: none;
      }

      .tagline-item .icon-fill {
        fill: #2563eb;
        stroke: none;
      }

      .tagline span {
        color: #1e293b;
      }

      /* LIVE RMI ENGINE badge - using pure SVG icons, no emojis */
      .rmi-badge {
        display: inline-flex;
        align-items: center;
        gap: 12px;
        background: #0f172a;
        backdrop-filter: blur(4px);
        padding: 8px 24px;
        border-radius: 60px;
        margin-bottom: 5px;
        border: 1px solid rgba(37, 99, 235, 0.3);
        box-shadow: 0 8px 20px -8px rgba(0, 0, 0, 0.15);
      }

      .live-dot {
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .pulsing-circle {
        width: 10px;
        height: 10px;
        background-color: #10b981;
        border-radius: 50%;
        box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7);
        animation: pulse-green 1.5s infinite;
      }

      @keyframes pulse-green {
        0% {
          transform: scale(0.95);
          box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7);
        }
        70% {
          transform: scale(1);
          box-shadow: 0 0 0 6px rgba(16, 185, 129, 0);
        }
        100% {
          transform: scale(0.95);
          box-shadow: 0 0 0 0 rgba(16, 185, 129, 0);
        }
      }

      .rmi-badge-text {
        font-weight: 700;
        font-size: 1rem;
        letter-spacing: 0.5px;
        color: white;
      }

      .rmi-badge-text strong {
        font-weight: 800;
        background: linear-gradient(120deg, #60a5fa, #a78bfa);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }

      .engine-icon {
        display: inline-flex;
        align-items: center;
      }

      /* subtitle updated */
      .subtitle {
        max-width: 800px;
        margin: 0 auto 40px;
        color: #4b5563;
        line-height: 1.6;
        font-size: 1.125rem;
      }

      /* chart container */
      .market-box {
        max-width: 1200px;
        margin: auto;
        padding: 25px;
        border-radius: 28px;
        background: #ffffff;
        border: 1px solid #e5e7eb;
        box-shadow:
          0 20px 35px -12px rgba(0, 0, 0, 0.05),
          0 1px 2px rgba(0, 0, 0, 0.02);
        transition: box-shadow 0.2s ease;
      }

      .tradingview-widget-container {
        width: 100%;
        overflow: hidden;
        border-radius: 20px;
      }

      .tradingview-widget-container__widget {
        width: 100%;
        height: 550px;
      }

      @media (max-width: 768px) {
        .market-section {
          padding: 50px 16px;
        }
        .main-headline {
          font-size: 34px;
        }
        .tagline {
          gap: 12px;
          flex-direction: row;
          flex-wrap: wrap;
        }
        .tagline-item {
          padding: 4px 12px;
          font-size: 0.85rem;
        }
        .rmi-badge {
          padding: 6px 18px;
        }
        .market-box {
          padding: 16px;
        }
        .tradingview-widget-container__widget {
          height: 450px;
        }
      }

      @media (max-width: 540px) {
        .tradingview-widget-container__widget {
          height: 400px;
        }
        .main-headline {
          font-size: 28px;
        }
      }

      .attribution {
        text-align: center;
        font-size: 12px;
        color: #9ca3af;
        margin-top: 30px;
        padding-bottom: 10px;
      }
      .attribution a {
        color: #6b7280;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <!-- ===================== Chart Section ===================== -->
    <section class="market-section">
      <div class="heading-group">
        <!-- New main heading: Live Market Intelligence (no emojis, pure text + svg icons integrated in tagline) -->
        <h1 class="main-headline">Live Market Intelligence</h1>

        <!-- Tagline with inline SVGs instead of emojis: RMI real-time clarity • institutional-grade signals • live walkthrough -->
        <div class="tagline">
          <div class="tagline-item">
            <!-- radar / clarity icon -->
            <svg
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="1.8"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M12 2a10 10 0 1 0 9.5 6.5" />
              <path d="M12 8a4 4 0 1 0 3.5 5.5" />
              <circle cx="12" cy="12" r="2" />
              <path d="M21 3v6h-6" />
            </svg>
            <span>RMI Real-Time Clarity</span>
          </div>
          <div class="tagline-item">
            <!-- signal / institutional icon (bar graph + wave) -->
            <svg
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="1.8"
            >
              <path d="M2 20L22 20" stroke="currentColor" />
              <path d="M6 16L6 10" stroke="currentColor" />
              <path d="M12 16L12 6" stroke="currentColor" />
              <path d="M18 16L18 12" stroke="currentColor" />
              <circle cx="18" cy="8" r="2" stroke="currentColor" />
            </svg>
            <span>Institutional-Grade Signals</span>
          </div>
          <div class="tagline-item">
            <!-- live walkthrough / play + eye icon -->
            <svg
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="1.8"
            >
              <circle cx="12" cy="12" r="10" />
              <path d="M10 8l6 4-6 4V8z" />
              <path d="M2 12h2M22 12h-2M12 2v2M12 20v2" stroke="currentColor" />
            </svg>
            <span>Live Walkthrough</span>
          </div>
        </div>

        <!-- LIVE • RMI ENGINE badge with SVG icons (no emojis) -->
        <div class="rmi-badge">
          <div class="live-dot">
            <span class="pulsing-circle"></span>
            <span class="rmi-badge-text" style="color: white">LIVE</span>
          </div>
          <span class="engine-icon">
            <svg
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              xmlns="http://www.w3.org/2000/svg"
            >
              <path
                d="M12 2L2 7L12 12L22 7L12 2Z"
                stroke="#60a5fa"
                stroke-width="1.5"
                fill="none"
              />
              <path
                d="M2 17L12 22L22 17"
                stroke="#60a5fa"
                stroke-width="1.5"
                fill="none"
              />
              <path
                d="M2 12L12 17L22 12"
                stroke="#a78bfa"
                stroke-width="1.5"
                fill="none"
              />
              <circle cx="12" cy="12" r="1.5" fill="#a78bfa" stroke="none" />
            </svg>
          </span>
          <span class="rmi-badge-text"><strong>RMI ENGINE</strong></span>
        </div>
      </div>

      <!-- <p class="subtitle">
        Preparation is everything. Start your trading day informed with our
        economic calendar, breaking news, market sentiment updates, and
        real-time charts to guide every decision confidently.
      </p> -->

      <div class="market-box">
        <div class="tradingview-widget-container">
          <div class="tradingview-widget-container__widget"></div>
          <!-- TradingView Widget: IDENTICAL configuration to original - same chart, same symbols, area type, dark theme inside.
                 No changes to the chart rendering. Live feed remains untouched.
                 Background of page is white, chart container background white, chart itself displays exactly as original. -->
          <script
            type="text/javascript"
            src="https://s3.tradingview.com/external-embedding/embed-widget-symbol-overview.js"
            async
          >
            {
              "lineWidth": 2,
              "chartType": "area",
              "backgroundColor": "#0b1120",
              "widgetFontColor": "#DBDBDB",
              "colorTheme": "dark",
              "autosize": true,
              "width": "100%",
              "height": 550,
              "symbols": [
                ["Gold","OANDA:XAUUSD|1D"],
                ["Bitcoin","BITSTAMP:BTCUSD|1D"],
                ["Crude Oil","TVC:USOIL|1D"]
              ]
            }
          </script>
        </div>
      </div>
    </section>
    <!-- ===================== Chart END ===================== -->

    <div class="attribution">
      <span>Real-time data via TradingView • RMI Engine active</span>
    </div>

    <!-- No extra scripts; TradingView embed loads widget exactly as original.
     All icons are pure SVG, no emojis used. Heading updated to "Live Market Intelligence"
     Tagline with icons and RMI badge fully respects the request. -->
  </body>
</html>
